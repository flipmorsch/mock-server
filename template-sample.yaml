listen: 127.0.0.1:8080
rules:
    - id: a496a090-ec2b-4245-9d31-2b0aac7d70e4
      name: rand
      request:
        method: GET
        path: /rand
        path_mode: exact
        headers:
            Content-Type: text/plain
      response:
        status: 200
        body: '{{randomString 8}}'
        template: true
    - id: 78d19f1a-065c-41a7-87f9-fb96758ed455
      name: echo
      request:
        method: GET
        path: /echo
      response:
        status: 200
        body: '{{.Method}} {{.Path}} — query page={{.Query "page"}}'
        template: true
    - id: bac8579a-9a7b-4bbd-9f91-360ee1315e11
      name: counter
      request:
        method: GET
        path: /count
      response:
        status: 200
        body: 'request #{{counter}} at {{now}}'
        template: true
    - id: 01c73d15-dee9-46d1-93ce-9c9b0872dedc
      name: get users
      request:
        method: GET
        path: /users
        path_mode: exact
      response:
        status: 200
        body: '{"ok": true, {{.Method}}}'
        delay: 500ms
        template: true
