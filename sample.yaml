listen: "127.0.0.1:8080"

rules:
  - name: "get users"
    request:
      method: GET
      path: /users
      path_mode: exact
    response:
      status: 200
      headers:
        content-type: application/json
      body: |
        [{"id": 1, "name": "Alice"}]

  - name: "create user"
    request:
      method: POST
      path: /users
      path_mode: exact
    response:
      status: 201
      body: |
        {"id": 2, "name": "Bob"}

  # Pattern path: {id} matches one segment and is echoed back via {{.Param}}.
  - name: "get user by id"
    request:
      method: GET
      path: /users/{id}
      path_mode: pattern
    response:
      status: 200
      headers:
        content-type: application/json
      template: true
      body: |
        {"id": "{{.Param "id"}}", "name": "User {{.Param "id"}}"}

  - name: "health check"
    request:
      method: GET
      path: /health
      path_mode: exact
    response:
      status: 200
      body: OK

  # Sequenced responses: each successive GET /jobs/1 advances the list; the last
  # sticks. Requires an explicit id (the sequence position is keyed by it).
  - name: "poll job until done"
    id: poll-job
    request:
      method: GET
      path: /jobs/1
      path_mode: exact
    responses:
      - status: 202
        body: '{"state": "pending"}'
      - status: 202
        body: '{"state": "pending"}'
      - status: 200
        body: '{"state": "done"}'
